services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - mongodb
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - '5000:5000'

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - '8080:80'

volumes:
  mongodb_data:
